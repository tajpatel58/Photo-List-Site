<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taj & Radhika Wedding Photos</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
</head>

<body>

<!-- Pre-wedding Photo -->
<div class="hero-image">
    <img src="prewedding.jpg" alt="Taj & Radhika">
</div>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="top-title">PHOTO LIST</div>
        <div class="names">TAJ + RADHIKA</div>
        <div class="date">20 - 06 - 2026</div>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
        <label class="search-label">Guest Search</label>
        <input type="text" id="searchInput" class="search-box" placeholder="Find your name...">
        <div class="search-line"></div>
    </div>

    <!-- Dynamic content -->
    <div id="photoContainer"></div>

</div>

<script>
async function loadCSV() {
    const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSufhFfUBXJ5cHxAu_O0ozx6Z5O9oZjF0V4L0y9QHMi4n_5XeNZPHXsiCp8EMw1pVfBIHFU9VdNhJ9S/pub?gid=1911387848&single=true&output=csv');
    const text = await response.text();

    const lines = text.split('\n');

    // Extract headers
    const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    // Find column indexes dynamically
    const radhikaIndex = headers.findIndex(h => h.trim().toLowerCase() === "radhika");
    const tajIndex = headers.findIndex(h => h.trim().toLowerCase() === "taj");

    if (radhikaIndex === -1 || tajIndex === -1) {
        console.error("Required columns (Radhika/Taj) not found in CSV");
        return;
    }

    const rows = lines.slice(1);
    const container = document.getElementById('photoContainer');

    let photoCounter = 1;

    rows.forEach(row => {
        if (!row.trim()) return;

        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        let radhikaRaw = cols[radhikaIndex]?.replaceAll('"','').trim();
        let tajRaw = cols[tajIndex]?.replaceAll('"','').trim();

        let radhikaList = radhikaRaw
            ? radhikaRaw.split(',').map(n => n.trim()).filter(n => n)
            : [];

        let tajList = tajRaw
            ? tajRaw.split(',').map(n => n.trim()).filter(n => n)
            : [];

        // Radhika photo
        if (radhikaList.length > 0) {
            createPhotoSection(container, photoCounter, radhikaList);
            photoCounter++;
        }

        // Taj photo
        if (tajList.length > 0) {
            createPhotoSection(container, photoCounter, tajList);
            photoCounter++;
        }
    });
}

function createPhotoSection(container, number, names) {
    const section = document.createElement('div');
    section.className = 'photo-section';

    const heading = document.createElement('div');
    heading.className = 'photo-heading';
    heading.textContent = `PHOTO ${number}`;

    const list = document.createElement('div');
    list.className = 'list';

    names.forEach(name => {
        const row = document.createElement('div');
        row.className = 'row';

        const span = document.createElement('span');
        span.className = 'person';
        span.textContent = name;

        row.appendChild(span);
        list.appendChild(row);
    });

    section.appendChild(heading);
    section.appendChild(list);
    container.appendChild(section);
}

// Search
function setupSearch() {
    const input = document.getElementById('searchInput');

    input.addEventListener('keyup', () => {
        const query = input.value.toLowerCase();
        const sections = document.querySelectorAll('.photo-section');

        sections.forEach(section => {
            const rows = section.querySelectorAll('.row');
            let match = false;

            rows.forEach(row => {
                const name = row.textContent.toLowerCase();

                if (name.includes(query)) {
                    row.classList.remove('hidden');
                    match = true;
                } else {
                    row.classList.add('hidden');
                }
            });

            if (match || query === "") {
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        });
    });
}

// Init
loadCSV().then(setupSearch);
</script>

</body>
</html>
